<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#grad1)"/>
  <circle cx="400" cy="150" r="60" fill="rgba(255,255,255,0.1)" filter="url(#glow)"/>
  <text x="400" y="170" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">👟</text>
  <rect x="150" y="210" width="500" height="3" fill="rgba(255,255,255,0.3)" rx="2"/>
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">Automated Footwear</text>
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">3D Quality Control</text>
  <rect x="250" y="320" width="300" height="50" fill="rgba(255,255,255,0.1)" rx="25"/>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">STL • 3D Visualization • Sensors</text>
  <circle cx="100" cy="100" r="40" fill="rgba(255,255,255,0.05)"/>
  <circle cx="700" cy="350" r="60" fill="rgba(255,255,255,0.05)"/>
</svg>
